<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Saver Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
        body{background:#f0f2f5;display:flex;justify-content:center;padding:20px}
        .card{background:#fff;padding:20px;border-radius:20px;width:100%;max-width:400px;box-shadow:0 10px 25px rgba(0,0,0,0.1)}
        h1{text-align:center;font-size:22px;margin-bottom:20px}
        input{width:100%;padding:12px;margin-bottom:10px;border:2px solid #ddd;border-radius:10px;font-size:16px}
        .btns{display:flex;gap:10px;margin-bottom:20px}
        button{flex:1;padding:15px;border:none;border-radius:10px;color:#fff;font-weight:bold;cursor:pointer}
        .wa{background:#25D366}.save{background:#4f46e5}.clear{background:#64748b}
        #qrcode-container{display:none;text-align:center;margin-top:20px;padding:15px;background:#f9f9f9;border-radius:15px}
        #qrcode{display:inline-block;margin-top:10px}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px}
    </style>
</head>
<body>

<div class="card">
    <h1>📱 Contact Saver</h1>
    <input id="name" type="text" placeholder="Name">
    <input id="phone" type="tel" placeholder="Phone Number (e.g. 9876543210)">
    
    <div class="btns">
        <button class="wa" onclick="app.whatsapp()">WhatsApp</button>
        <button class="save" onclick="app.save()">Save Contact</button>
        <button class="clear" onclick="app.clear()">🗑</button>
    </div>

    <div id="qrcode-container">
        <p style="font-size:12px; color:#666">If download fails, scan this:</p>
        <div id="qrcode"></div>
    </div>
</div>

<script>
const app = {
    name: () => document.getElementById('name').value,
    phone: () => document.getElementById('phone').value.replace(/\D/g, ''),
    
    whatsapp() {
        if(!this.phone()) return this.toast("Enter number");
        window.open(`https://wa.me/91${this.phone()}`, '_blank');
    },

    save() {
        const n = this.name() || "New Contact";
        const p = this.phone();
        if(!p) return this.toast("Enter number");
        const fullP = p.length <= 10 ? "91" + p : p;

        // 1. Try Android Intent (Single line, no spaces)
        const intent = `intent:#Intent;action=android.intent.action.INSERT;type=vnd.android.cursor.dir/contact;S.name=${encodeURIComponent(n)};S.phone=${encodeURIComponent('+'+fullP)};end`;
        
        try {
            window.location.href = intent;
        } catch(e) {}

        // 2. Trigger vCard Download after a short delay
        setTimeout(() => {
            this.downloadVCF(n, fullP);
            this.showQR(n, fullP);
        }, 500);
    },

    downloadVCF(n, p) {
        const vcf = `BEGIN:VCARD\nVERSION:3.0\nFN:${n}\nTEL;TYPE=CELL:+${p}\nEND:VCARD`;
        const blob = new Blob([vcf], { type: 'text/vcard' });
        const url = window.URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = `${n.replace(/\s+/g, '_')}.vcf`;
        document.body.appendChild(a);
        a.click();
        
        this.toast("Attempting download...");
        setTimeout(() => window.URL.revokeObjectURL(url), 2000);
    },

    showQR(n, p) {
        const qrContainer = document.getElementById('qrcode-container');
        const qrDiv = document.getElementById('qrcode');
        qrDiv.innerHTML = "";
        qrContainer.style.display = "block";
        
        const vcardData = `BEGIN:VCARD\nVERSION:3.0\nFN:${n}\nTEL:+${p}\nEND:VCARD`;
        new QRCode(qrDiv, {
            text: vcardData,
            width: 150,
            height: 150
        });
    },

    clear() {
        document.getElementById('name').value = "";
        document.getElementById('phone').value = "";
        document.getElementById('qrcode-container').style.display = "none";
    },

    toast(msg) {
        const t = document.createElement("div");
        t.className = "toast";
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
};
</script>
</body>
</html>
