<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp & QR Contact</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif}
        body{background:#e5ddd5;display:flex;justify-content:center;padding:20px;min-height:100vh}
        .card{background:#fff;padding:25px;border-radius:20px;width:100%;max-width:380px;box-shadow:0 10px 30px rgba(0,0,0,0.1);height:fit-content}
        h2{text-align:center;color:#075e54;margin-bottom:20px;font-size:20px}
        
        .input-box{margin-bottom:15px}
        label{display:block;font-size:12px;color:#666;margin-bottom:5px;margin-left:5px}
        input{width:100%;padding:15px;border:1.5px solid #eee;border-radius:12px;font-size:16px;background:#f9f9f9}
        input:focus{outline:none;border-color:#25D366;background:#fff}

        .btn-group{display:flex;flex-direction:column;gap:10px;margin-top:10px}
        button{width:100%;padding:15px;border:none;border-radius:12px;font-weight:700;cursor:pointer;transition:0.2s}
        .btn-wa{background:#25D366;color:white}
        .btn-qr{background:#128C7E;color:white}
        button:active{transform:scale(0.98)}

        #qr-result{
            display:none;
            margin-top:25px;
            text-align:center;
            padding-top:20px;
            border-top:1px dashed #ccc;
        }
        #qrcode{display:inline-block;padding:10px;background:#fff;border:1px solid #eee}
        .instruction{font-size:12px;color:#777;margin-top:10px;line-height:1.4}
    </style>
</head>
<body>

<div class="card">
    <h2>Connect Instantly</h2>
    
    <div class="input-box">
        <label>Name</label>
        <input id="name" type="text" placeholder="e.g. John Doe">
    </div>

    <div class="input-box">
        <label>Phone (with country code)</label>
        <input id="phone" type="tel" placeholder="e.g. 919876543210">
    </div>

    <div class="btn-group">
        <button class="btn-wa" onclick="actions.openWA()">Message on WhatsApp</button>
        <button class="btn-qr" onclick="actions.generateQR()">Generate Contact QR</button>
    </div>

    <div id="qr-result">
        <div id="qrcode"></div>
        <p class="instruction">
            <strong>How to save:</strong><br>
            1. Take a screenshot.<br>
            2. Open with <b>Google Lens</b> or Photos.<br>
            3. Tap "Add Contact".
        </p>
    </div>
</div>

<script>
const actions = {
    getName: () => document.getElementById('name').value.trim(),
    getPhone: () => document.getElementById('phone').value.replace(/\D/g, ''),

    openWA() {
        const p = this.getPhone();
        if(!p) return alert("Please enter a phone number");
        window.open(`https://wa.me/${p}`, '_blank');
    },

    generateQR() {
        const n = this.getName() || "New Contact";
        const p = this.getPhone();
        
        if(!p) return alert("Please enter a phone number");

        const qrDiv = document.getElementById('qrcode');
        const container = document.getElementById('qr-result');
        
        qrDiv.innerHTML = ""; // Clear old QR
        container.style.display = "block";

        // VCard format is recognized by all phone cameras/Google Lens
        const vcard = `BEGIN:VCARD\nVERSION:3.0\nFN:${n}\nTEL;TYPE=CELL:+${p}\nEND:VCARD`;

        new QRCode(qrDiv, {
            text: vcard,
            width: 180,
            height: 180,
            correctLevel: QRCode.CorrectLevel.H
        });

        // Smooth scroll to QR code
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
};
</script>

</body>
</html>
